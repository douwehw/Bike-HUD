; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_echo = no

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    ottowinter/ESPAsyncWebServer-esphome @ 3.3.0

build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1          ; Swapped to target the new ILI9341 controller IC
    -D TFT_WIDTH=240             ; Physical hardware width (Short axis)
    -D TFT_HEIGHT=320            ; Physical hardware height (Long axis)
    -D TFT_MISO=19
    -D TFT_SCLK=18
    -D TFT_MOSI=23
    -D TFT_DC=2
    -D TFT_RST=4
    -D TFT_CS=15
    -D LOAD_GFXFF=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT7=1              ; Large 7-Segment font for speed tracking
    -D SPI_FREQUENCY=20000000    ; ILI9341 runs comfortably at 40MHz for snappy updates
    -D TOUCH_CS=-1
